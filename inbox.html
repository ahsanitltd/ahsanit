<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AhsanIT Inbox Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
        }

        body {
            background: var(--bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .inbox-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .table thead {
            background: var(--primary);
            color: white;
        }

        .badge-time {
            font-size: 0.75rem;
            color: #64748b;
        }

        .delete-btn {
            cursor: pointer;
            transition: 0.3s;
            color: #ef4444;
        }

        .delete-btn:hover {
            color: #b91c1c;
            transform: scale(1.2);
        }

        .empty-state {
            padding: 100px 0;
            color: #94a3b8;
        }
    </style>
</head>

<body>

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold text-dark"><i class="fa fa-inbox text-primary me-2"></i>AhsanIT Inbox</h2>
                <p class="text-muted small">ব্রাউজারে সেভ হওয়া সকল মেসেজ এখানে দেখা যাবে।</p>
            </div>
            <div class="d-flex gap-2">
                <a href="index.html" class="btn btn-outline-primary btn-sm rounded-pill px-3">
                    <i class="fa fa-arrow-left me-1"></i> ব্যাক টু সাইট
                </a>
                <button onclick="clearAll()" class="btn btn-danger btn-sm rounded-pill px-3">
                    <i class="fa fa-trash-alt me-1"></i> সব মুছুন
                </button>
            </div>
        </div>

        <div class="card inbox-card p-4">
            <div class="table-responsive">
                <table class="table table-hover align-middle" id="inboxTable">
                    <thead>
                        <tr>
                            <th>তারিখ ও সময়</th>
                            <th>প্রেরকের নাম</th>
                            <th>ইমেইল</th>
                            <th>মেসেজ</th>
                            <th class="text-center">অ্যাকশন</th>
                        </tr>
                    </thead>
                    <tbody id="messageList">
                    </tbody>
                </table>
            </div>

            <div id="noData" class="empty-state text-center d-none">
                <i class="fa fa-folder-open display-1 opacity-25 mb-3"></i>
                <h3>ইনবক্স একদম খালি!</h3>
                <p>এখনো কোনো মেসেজ সেভ করা হয়নি।</p>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        function loadMessages() {
            const messages = JSON.parse(localStorage.getItem('ahsanit_inbox')) || [];
            const list = $('#messageList');
            const emptyState = $('#noData');

            list.empty();

            if (messages.length === 0) {
                $('#inboxTable').addClass('d-none');
                emptyState.removeClass('d-none');
            } else {
                $('#inboxTable').removeClass('d-none');
                emptyState.addClass('d-none');

                // লেটেস্ট মেসেজ আগে দেখানোর জন্য reverse করা হলো
                messages.reverse().forEach((msg, index) => {
                    list.append(`
                    <tr>
                        <td><span class="badge-time fw-bold">${msg.time}</span></td>
                        <td class="fw-bold text-primary">${msg.name}</td>
                        <td><a href="mailto:${msg.email}" class="text-decoration-none text-muted">${msg.email}</a></td>
                        <td><div style="max-width: 300px; font-size: 0.9rem;">${msg.message}</div></td>
                        <td class="text-center">
                            <i class="fa fa-trash-alt delete-btn" onclick="deleteMessage(${msg.id})"></i>
                        </td>
                    </tr>
                `);
                });
            }
        }

        // নির্দিষ্ট একটি মেসেজ ডিলিট করা
        function deleteMessage(id) {
            Swal.fire({
                title: 'আপনি কি নিশ্চিত?',
                text: "এই মেসেজটি চিরতরে মুছে যাবে!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#2563eb',
                cancelButtonColor: '#d33',
                confirmButtonText: 'হ্যাঁ, মুছুন!'
            }).then((result) => {
                if (result.isConfirmed) {
                    let messages = JSON.parse(localStorage.getItem('ahsanit_inbox')) || [];
                    messages = messages.filter(m => m.id !== id);
                    localStorage.setItem('ahsanit_inbox', JSON.stringify(messages));
                    loadMessages();
                    Swal.fire('ডিলিট হয়েছে!', 'মেসেজটি মুছে ফেলা হয়েছে।', 'success');
                }
            });
        }

        // সব মেসেজ ক্লিয়ার করা
        function clearAll() {
            Swal.fire({
                title: 'সব ডিলিট করবেন?',
                icon: 'error',
                showCancelButton: true,
                confirmButtonText: 'হ্যাঁ, সব মুছুন'
            }).then((result) => {
                if (result.isConfirmed) {
                    localStorage.removeItem('ahsanit_inbox');
                    loadMessages();
                }
            });
        }

        // পেজ লোড হলে ফাংশনটি রান করবে
        $(document).ready(function () {
            loadMessages();
        });
    </script>

</body>

</html>
