<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AhsanIT Inbox Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
        }

        body {
            background: var(--bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .inbox-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .table thead {
            background: var(--primary);
            color: white;
        }

        .badge-time {
            font-size: 0.75rem;
            color: #64748b;
        }

        .delete-btn {
            cursor: pointer;
            transition: 0.3s;
            color: #ef4444;
        }

        .delete-btn:hover {
            color: #b91c1c;
            transform: scale(1.2);
        }

        .empty-state {
            padding: 100px 0;
            color: #94a3b8;
        }
    </style>
</head>

<body>

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold text-dark"><i class="fa fa-inbox text-primary me-2"></i>AhsanIT Inbox</h2>
                <p class="text-muted small">ব্রাউজারে সেভ হওয়া সকল মেসেজ এখানে দেখা যাবে।</p>
            </div>
            <div class="d-flex gap-2">
                <a href="index.html" class="btn btn-outline-primary btn-sm rounded-pill px-3">
                    <i class="fa fa-arrow-left me-1"></i> ব্যাক টু সাইট
                </a>
                <button onclick="clearAll()" class="btn btn-danger btn-sm rounded-pill px-3">
                    <i class="fa fa-trash-alt me-1"></i> সব মুছুন
                </button>
            </div>
        </div>

        <div class="card inbox-card p-4">
            <div class="table-responsive">
                <table class="table table-hover align-middle" id="inboxTable">
                    <thead>
                        <tr>
                            <th>তারিখ ও সময়</th>
                            <th>প্রেরকের নাম</th>
                            <th>ইমেইল</th>
                            <th>মেসেজ</th>
                            <th class="text-center">অ্যাকশন</th>
                        </tr>
                    </thead>
                    <tbody id="messageList">
                    </tbody>
                </table>
            </div>

            <div id="noData" class="empty-state text-center d-none">
                <i class="fa fa-folder-open display-1 opacity-25 mb-3"></i>
                <h3>ইনবক্স একদম খালি!</h3>
                <p>এখনো কোনো মেসেজ সেভ করা হয়নি।</p>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-cookie@3.0.1/dist/js.cookie.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/isotope-layout@3/dist/isotope.pkgd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <script>

        // --- ১. গ্লোবাল কনফিগ ---
        const LIBS = [
            "https://code.jquery.com/jquery-3.6.0.min.js",
        ];

        const SECRET_KEY = "AhsanIT_Architect_Key_@2026";
        const MASTER_PASSWORD = "admin"; // আপনার ইনবক্স পাসওয়ার্ড
        const STORAGE_KEY = "ahsanit_inbox";

        // --- ২. লাইব্রেরি লোডার (Sequential Waterfall) ---
        function loadDependencies(index = 0) {
            if (index >= LIBS.length) {
                initAhsanIT(); // সব লোড হলে মেইন অ্যাপ রান হবে
                return;
            }
            const script = document.createElement('script');
            script.src = LIBS[index];
            script.async = false;
            script.onload = () => loadDependencies(index + 1);
            document.head.appendChild(script);
        }

        // --- ৩. সিকিউরিটি লজিক (Encryption/Decryption) ---
        function encryptData(obj) {
            return CryptoJS.AES.encrypt(JSON.stringify(obj), SECRET_KEY).toString();
        }

        function decryptInbox() {
            const data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            const decryptedArray = [];

            data.forEach(item => {
                try {
                    const bytes = CryptoJS.AES.decrypt(item, SECRET_KEY);
                    const decryptedText = bytes.toString(CryptoJS.enc.Utf8);

                    // যদি ডিক্রিপশন সাকসেসফুল হয় তবেই পুশ করবে
                    if (decryptedText) {
                        decryptedArray.push(JSON.parse(decryptedText));
                    }
                } catch (e) {
                    console.warn("Skipping corrupted or unencrypted data entry.");
                }
            });

            return decryptedArray;
        }

        // --- ৪. কোর ফিচার ফাংশনস ---

        // কন্টাক্ট ফর্ম হ্যান্ডলার
        function setupContactForm() {
            $('#localContactForm').on('submit', function (e) {
                e.preventDefault();

                // বট প্রটেকশন
                if ($('#botField').val()) return;

                const msg = {
                    id: Date.now(),
                    name: $('#userName').val().trim(),
                    email: $('#userEmail').val().trim(),
                    message: $('#userMsg').val().trim(),
                    time: new Date().toLocaleString()
                };

                let inbox = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
                inbox.push(encryptData(msg));
                localStorage.setItem(STORAGE_KEY, JSON.stringify(inbox));

                $('#msgStatus').removeClass('d-none').fadeIn().delay(3000).fadeOut();
                this.reset();
            });
        }

        // ইনবক্স টেবিল রেন্ডারার
        function renderInboxTable() {
            if ($('#messageList').length === 0) return; // ইনবক্স পেজে না থাকলে স্কিপ করবে

            const userPass = prompt("এই ইনবক্সটি সুরক্ষিত। পাসওয়ার্ড দিন:");
            if (userPass !== MASTER_PASSWORD) {
                alert("ভুল পাসওয়ার্ড! এক্সেস ডিনাইড।");
                window.location.href = "index.html";
                return;
            }

            const messages = decryptInbox();
            const list = $('#messageList');
            list.empty();

            if (messages.length === 0) {
                $('#inboxTable').addClass('d-none');
                $('#noData').removeClass('d-none');
            } else {
                $('#inboxTable').removeClass('d-none');
                $('#noData').addClass('d-none');

                messages.reverse().forEach(msg => {
                    list.append(`
                <tr>
                    <td><span class="badge bg-light text-dark">${msg.time}</span></td>
                    <td class="fw-bold text-primary">${msg.name}</td>
                    <td><a href="mailto:${msg.email}" class="text-muted">${msg.email}</a></td>
                    <td><div style="max-width: 300px; font-size: 0.85rem;">${msg.message}</div></td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteEntry(${msg.id})">
                            <i class="fa fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `);
                });
            }
        }

        // ডিলিট মেসেজ
        window.deleteEntry = function (id) {
            Swal.fire({
                title: 'মুছে ফেলবেন?',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'হ্যাঁ'
            }).then((res) => {
                if (res.isConfirmed) {
                    let data = decryptInbox();
                    data = data.filter(m => m.id !== id);
                    const encryptedData = data.map(m => encryptData(m));
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(encryptedData));
                    location.reload();
                }
            });
        };

        // স্লাইডার এবং অন্যান্য UI (আগের সব লজিক মার্জ করা)
        function initUI() {
            // Hero Slider
            if ($('.hero-slider').length) {
                new Swiper('.hero-slider', {
                    loop: true,
                    autoplay: { delay: 5000 },
                    effect: 'fade',
                    pagination: { el: '.swiper-pagination', clickable: true }
                });
            }
            // Theme Toggle
            $('#themeToggle').click(function () {
                $('body').toggleClass('dark-mode');
                Cookies.set('theme', $('body').hasClass('dark-mode') ? 'dark' : 'light');
            });
        }

        // --- ৫. বুটস্ট্র্যাপ অ্যাপ ---
        function initAhsanIT() {
            $(document).ready(function () {
                setupContactForm();
                renderInboxTable();
                initUI();
                console.log("AhsanIT Engine: Online & Secure.");
            });
        }

        // শুরু করুন
        loadDependencies();
    </script>

</body>

</html>
